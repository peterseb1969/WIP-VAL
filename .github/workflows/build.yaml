name: Build & Push Image (x86)

# Manually triggered: Actions tab -> Run workflow. Builds the production
# image and pushes it to GHCR as ghcr.io/<owner>/wip-val:<tag>. Empty tag
# input falls back to sha-<short>. VITE_BASE_PATH must match the platform
# manifest's APP_BASE_PATH (apps/wip-val/wip-app.yaml in World-in-a-Pie).
#
# Platforms: default native amd64. Set the platforms input to e.g.
# "linux/amd64,linux/arm64" for a multi-arch manifest via buildx + QEMU
# (emulated arm64 npm ci/build is slow).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 1.0.0). Leave empty for sha-<short-commit>.'
        required: false
        default: ''
      platforms:
        description: 'Comma-separated platforms. Default native amd64; e.g. linux/amd64,linux/arm64 for multi-arch (QEMU, slow).'
        required: false
        default: 'linux/amd64'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building with tag: $TAG"

      - name: Set up QEMU (multi-arch only)
        if: inputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          docker buildx build \
            --platform "${{ inputs.platforms }}" \
            --build-arg VITE_BASE_PATH=/apps/wip-val/ \
            -t "ghcr.io/${{ github.repository_owner }}/wip-val:${{ steps.tag.outputs.tag }}" \
            --push .
